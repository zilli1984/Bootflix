<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
        BotFlix - Your personal assistant to find the perfect movie
    </title>

    <link rel="stylesheet" href="src/css/reset.css" />
    <link rel="stylesheet" href="src/css/styles.css" />
    <link rel="stylesheet" href="src/css/animations.css" />
    <link rel="stylesheet" href="src/css/responsive.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
</head>

<body>
    <div class="bg"></div>
    <div class="bg bg2"></div>
    <div class="bg bg3"></div>
    <main class="container">
        <div class="main-content">
            <header class="brand-header">
                <div class="container-logo">
                    <img src="src/imagens/botflix-robot.jpg" alt="BotFlix Robot Assistant" class="robot-image" />
                    <h1 class="brand-title">BotFlix</h1>
                </div>
                <p class="brand-subtitle">
                    Your personal assistant to find the perfect movie
                </p>
            </header>
            <section class="search-card">
                <div class="search-content">
                    <div class="input-container">
                        <textarea id="mood-input" rows="3"
                            placeholder="Tell us how you're feeling or what you want to watch..."
                            class="mood-input"></textarea>
                    </div>
                    <div class="examples">
                        <p class="examples-title">Examples:</p>
                        <ul class="examples-list">
                            <li>• I want something funny to unwind after work</li>
                            <li>• Looking for a thriller that keeps me on the edge of my seat</li>
                            <li>• Something romantic to watch with my girlfriend</li>
                        </ul>
                    </div>
                    <button id="search-button" class="search-button">
                        <span class="play-icon">▶</span>
                        Find Perfect Movies
                    </button>
                </div>
            </section>
            <div>
                <div id="results">
                    <h2>Perfect movies for you</h2>
                    <div id="movies-grid" class="movies-grid">
                        <div class="movie-card">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="src/js/index.js"></script>
</body>

</html>
